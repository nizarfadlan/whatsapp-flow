name: whatsapp-flow

services:
  postgres:
    image: postgres:17-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: whatsapp-flow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatsapp-flow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    profiles:
      - tools
    env_file:
      - .env.docker
    restart: "no"

  server:
    build:
      context: .
      target: server
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-3000}
      LOCAL_UPLOAD_DIR: /app/uploads
    extra_hosts:
      - "keycloak.qti.co.id:10.10.10.155"
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:${SERVER_PORT:-3000}/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:3000}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${WEB_PORT:-3001}
    extra_hosts:
      - "keycloak.qti.co.id:10.10.10.155"
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${WEB_PORT:-3001}/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
