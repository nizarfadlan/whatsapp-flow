name: Docker

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker environment
        run: cp .env.docker.example .env.docker

      - name: Validate Compose config
        run: docker compose --env-file .env.docker.example config

      - name: Build Docker images
        run: docker compose --env-file .env.docker.example build server web migrate

      - name: Start fresh PostgreSQL
        run: docker compose --env-file .env.docker.example --profile local-db up -d --wait postgres

      - name: Apply migrations twice
        run: |
          docker compose --env-file .env.docker.example --profile tools run --rm migrate
          docker compose --env-file .env.docker.example --profile tools run --rm migrate

      - name: Stop PostgreSQL
        if: always()
        run: docker compose --env-file .env.docker.example --profile local-db down -v
